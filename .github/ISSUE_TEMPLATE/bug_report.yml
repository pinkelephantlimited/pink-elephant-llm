name: Bug Report
description: Report an issue with model loading or inference
labels: ["bug"]
body:
  - type: input
    id: model
    attributes:
      label: Model
      description: Which model has the issue?
      placeholder: pink-elephant-llm-33b
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the issue
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce
